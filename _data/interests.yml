- title: Visual Attention
  description: Understanding different aspects including coputational, behavioral and neural aspects of visual attention in everyday life.
  
- title: Computational Modeling
  description: Developing computational models to understand and predict human behavior in complex environments.

- title: Behavioral Analysis
  description: Analyzing human behavior in real-world settings to gain insights into cognitive processes and decision-making.

- title: Neural Mechanisms
  description: Investigating the neural mechanisms underlying visual attention and behavior using neuroimaging and electrophysiological techniques.